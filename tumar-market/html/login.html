<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Вход — Tumar Market</title>
  <link rel="stylesheet" href="/css/main.css">
  <link rel="stylesheet" href="/css/auth.css">
</head>
<body>
  <header class="header">
    <div class="header-top">
      <a href="/" class="logo">Tumar<span>.Market</span></a>
    </div>
  </header>

  <main class="auth-main">
    <div class="auth-card">
      <div class="auth-logo">Tumar<span>.Market</span></div>
      <h1 class="auth-title">Войти в аккаунт</h1>

      <form id="login-form" novalidate>
        <div class="form-group">
          <label class="form-label">Email</label>
          <input type="email" id="email" class="form-control" placeholder="example@email.com" required>
        </div>
        <div class="form-group">
          <label class="form-label">Пароль</label>
          <div class="password-wrap">
            <input type="password" id="password" class="form-control" placeholder="Введите пароль" required>
            <button type="button" class="password-toggle" onclick="togglePassword()">👁</button>
          </div>
        </div>

        <div id="login-error" class="error-msg" style="display:none"></div>

        <button type="submit" class="btn btn-primary btn-lg" style="width:100%">
          <span id="login-text">Войти</span>
          <span id="login-spinner" style="display:none">⏳</span>
        </button>
      </form>

      <div class="auth-divider">или</div>

      <div class="auth-links">
        <p>Нет аккаунта? <a href="/register">Зарегистрироваться</a></p>
        <p style="margin-top:8px">
          <a href="/seller/store-register" style="color:var(--red)">🏪 Стать продавцом</a>
        </p>
      </div>

      <div class="demo-accounts">
        <p class="demo-title">Демо аккаунты:</p>
        <button class="demo-btn" onclick="fillDemo('user@tumar.kz','user123')">👤 Покупатель</button>
        <button class="demo-btn" onclick="fillDemo('seller@tumar.kz','seller123')">🏪 Продавец</button>
        <button class="demo-btn" onclick="fillDemo('admin@tumar.kz','admin123')">👑 Администратор</button>
      </div>
    </div>
  </main>

  <script src="/js/main.js"></script>
  <script src="/js/auth.js"></script>
</body>
</html>
