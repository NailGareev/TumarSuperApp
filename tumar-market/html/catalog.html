<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Каталог товаров — Tumar Market</title>
  <link rel="stylesheet" href="/css/main.css">
  <link rel="stylesheet" href="/css/catalog.css">
</head>
<body>
  <header class="header">
    <div class="header-top">
      <a href="/" class="logo">Tumar<span>.Market</span></a>
      <form id="search-form" class="search-bar">
        <input id="search-input" type="text" placeholder="Поиск по товарам...">
        <button type="submit">🔍</button>
      </form>
      <div id="header-user-nav" class="header-actions"></div>
    </div>
    <nav class="header-nav"><ul id="categories-nav"></ul></nav>
  </header>

  <main class="page-content">
    <div class="container">
      <div class="breadcrumb">
        <a href="/">Главная</a>
        <span class="breadcrumb-sep">›</span>
        <span id="breadcrumb-category">Каталог</span>
      </div>

      <div class="catalog-layout">
        <!-- SIDEBAR FILTERS -->
        <aside class="catalog-sidebar">
          <div class="filter-card">
            <h3 class="filter-title">Категории</h3>
            <ul class="filter-category-list" id="filter-categories"></ul>
          </div>

          <div class="filter-card">
            <h3 class="filter-title">Цена, ₸</h3>
            <div class="price-range">
              <input type="number" id="filter-min-price" class="form-control" placeholder="От">
              <span>—</span>
              <input type="number" id="filter-max-price" class="form-control" placeholder="До">
            </div>
            <button class="btn btn-primary btn-sm" onclick="applyFilters()" style="width:100%;margin-top:10px">Применить</button>
          </div>
        </aside>

        <!-- PRODUCTS AREA -->
        <div class="catalog-main">
          <div class="catalog-header">
            <h1 class="catalog-title" id="catalog-title">Все товары</h1>
            <div class="catalog-controls">
              <span id="products-count" class="products-count"></span>
              <select id="sort-select" class="form-control sort-select" onchange="applyFilters()">
                <option value="newest">Новинки</option>
                <option value="price_asc">Цена: по возрастанию</option>
                <option value="price_desc">Цена: по убыванию</option>
                <option value="rating">По рейтингу</option>
              </select>
            </div>
          </div>

          <div class="product-grid" id="products-grid">
            <div class="loading-wrapper"><div class="spinner"></div></div>
          </div>

          <div class="pagination" id="pagination"></div>
        </div>
      </div>
    </div>
  </main>

  <footer class="footer">
    <div class="footer-bottom"><p>© 2024 Tumar Market</p></div>
  </footer>

  <script src="/js/main.js"></script>
  <script src="/js/catalog.js"></script>
</body>
</html>
