<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Регистрация — Tumar Market</title>
  <link rel="stylesheet" href="/css/main.css">
  <link rel="stylesheet" href="/css/auth.css">
</head>
<body>
  <header class="header">
    <div class="header-top">
      <a href="/" class="logo">Tumar<span>.Market</span></a>
    </div>
  </header>

  <main class="auth-main">
    <div class="auth-card" style="max-width:460px">
      <div class="auth-logo">Tumar<span>.Market</span></div>
      <h1 class="auth-title">Создать аккаунт</h1>

      <form id="register-form" novalidate>
        <div class="form-group">
          <label class="form-label">Имя и Фамилия</label>
          <input type="text" id="name" class="form-control" placeholder="Иван Иванов" required>
        </div>
        <div class="form-group">
          <label class="form-label">Email</label>
          <input type="email" id="email" class="form-control" placeholder="example@email.com" required>
        </div>
        <div class="form-group">
          <label class="form-label">Номер телефона</label>
          <input type="tel" id="phone" class="form-control" placeholder="+7 701 000 0000">
        </div>
        <div class="form-group">
          <label class="form-label">Пароль</label>
          <div class="password-wrap">
            <input type="password" id="password" class="form-control" placeholder="Минимум 6 символов" required>
            <button type="button" class="password-toggle" onclick="togglePassword('password')">👁</button>
          </div>
          <div class="password-strength" id="strength-bar">
            <div class="strength-fill" id="strength-fill"></div>
          </div>
          <p class="strength-label" id="strength-label"></p>
        </div>
        <div class="form-group">
          <label class="form-label">Подтвердите пароль</label>
          <div class="password-wrap">
            <input type="password" id="password2" class="form-control" placeholder="Повторите пароль" required>
            <button type="button" class="password-toggle" onclick="togglePassword('password2')">👁</button>
          </div>
        </div>

        <div class="form-group">
          <label class="checkbox-label">
            <input type="checkbox" id="agree" required>
            <span>Согласен с <a href="#" class="text-red">условиями использования</a></span>
          </label>
        </div>

        <div id="register-error" class="error-msg" style="display:none"></div>

        <button type="submit" class="btn btn-primary btn-lg" style="width:100%">Зарегистрироваться</button>
      </form>

      <div class="auth-links" style="margin-top:20px">
        <p>Уже есть аккаунт? <a href="/login">Войти</a></p>
      </div>
    </div>
  </main>

  <script src="/js/main.js"></script>
  <script src="/js/auth.js"></script>
</body>
</html>
